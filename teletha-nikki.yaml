# 机场订阅，名称不能重复 https://linux.do/t/topic/236407/12
proxy-providers:
  Ikuuu-lyka:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    url: ""

   
proxies:
- name: "🟢 全球直连"
  type: direct
  udp: true

 # 来自 Wispbyte.com
- name: "Wispbyte"
  type: tuic
  server: 85.215.131.70
  port: 14708
  uuid: 1ec3458e-1f1d-4836-9084-06407be3b138
  password: b9b7a3c4cbf851c8783dcc9a085ce3c2
  congestion_control: bbr
  alpn:
    - h3
  disable_sni: false
  reduce_rtt: true
  max_udp_relay_packet_size: 8192
  udp_relay_mode: native
  sni: www.bing.com
  skip_cert_verify: true

# 策略组
proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择, ♻️ 香港自动, ♻️ 日本自动,♻️ 新加坡自动, ♻️ 美国自动, 🌐 全部节点, 🔯 香港故转, 🔯 日本故转, 🟢 全球直连, Wispbyte]}

  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$" }
  - {name: ♻️ 新加坡自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新|SG|(?i) Singapore))^((?!(港|台|日|韩|美)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连|剩余流量|距离下次|套餐到期)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}
  - {name: 🔯 香港故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$" }

  - {name: 📹 YouTube, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 🍀 Google, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 🤖 ChatGPT, type: select, proxies: [♻️ 新加坡自动, 🟢 全球直连]}
  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 🎵 TikTok, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 📲 Telegram, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 🎥 NETFLIX, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: ✈️ Speedtest, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}
  - {name: 💶 PayPal, type: select, proxies: [🚀 节点选择, 🟢 全球直连]}

  - {name: 🪟 Microsoft, type: select, proxies: [🟢 全球直连, 🚀 节点选择]}
  - {name: 🐬 OneDrive, type: select, proxies: [🟢 全球直连, 🚀 节点选择]}
